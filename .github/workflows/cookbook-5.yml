name: Cookbook 5 - Matrix Builds

on:
  push:
    branches: [ main ]
    paths:
      - 'cookbook-5/**'
      - '.github/workflows/cookbook-5.yml'
  pull_request:
    paths:
      - 'cookbook-5/**'
  workflow_dispatch:

env:
  GITHUB_REPOSITORY: ${{ github.repository }}
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push multi-platform images
        working-directory: ./cookbook-5
        run: docker buildx bake --push

      - name: List created images
        run: |
          echo "✅ Built images for Node.js versions: 18, 20, 22"
          echo ""
          echo "Node 18:"
          echo "  - ghcr.io/${{ github.repository }}:node18-latest"
          echo "  - ${{ secrets.DOCKERHUB_USERNAME }}/cookbook-5:node18-latest"
          echo ""
          echo "Node 20 (also tagged as latest):"
          echo "  - ghcr.io/${{ github.repository }}:node20-latest"
          echo "  - ghcr.io/${{ github.repository }}:latest"
          echo "  - ${{ secrets.DOCKERHUB_USERNAME }}/cookbook-5:node20-latest"
          echo "  - ${{ secrets.DOCKERHUB_USERNAME }}/cookbook-5:latest"
          echo ""
          echo "Node 22:"
          echo "  - ghcr.io/${{ github.repository }}:node22-latest"
          echo "  - ${{ secrets.DOCKERHUB_USERNAME }}/cookbook-5:node22-latest"
